<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Setting Training{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-logo">Setting Training</a>
    <div class="nav-links">
      {% if session.get('user_id') %}
        <span class="nav-user">{{ session.get('user_nom') }}</span>
        <a href="{{ url_for('index') }}">Entraînement</a>
        <a href="{{ url_for('logout') }}" class="nav-logout">Déconnexion</a>
      {% else %}
        <a href="{{ url_for('login') }}">Connexion</a>
        <a href="{{ url_for('register') }}">Créer un compte</a>
      {% endif %}
      <a href="{{ url_for('coach') }}" class="nav-coach">Coach</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
