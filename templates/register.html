{% extends "base.html" %}
{% block title %}Créer un compte — Setting Training{% endblock %}

{% block content %}
<div class="page-center">
  <div class="card auth-card">
    <div class="setup-header">
      <h1>Rejoindre Setting Training</h1>
      <p>Crée ton compte pour commencer à t'entraîner.</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('register') }}" method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">Ton prénom</label>
        <input type="text" name="nom" required class="form-input" placeholder="Prénom" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" required class="form-input" placeholder="ton@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" required class="form-input" placeholder="Minimum 6 caractères" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" name="confirm" required class="form-input" placeholder="Répète ton mot de passe" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Créer mon compte</button>
    </form>

    <p class="auth-footer">
      Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
